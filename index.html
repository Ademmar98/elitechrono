<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite Chrono — Luxury Timepieces</title>
  <meta name="description" content="Discover extraordinary timepieces from the world's finest watch maisons. Rolex, Patek Philippe, Audemars Piguet and more.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" src="/src/main.js"></script>
  <script>function toggleMenu(){var l=document.getElementById('navLinks');if(l){var o=l.classList.toggle('open');var b=document.getElementById('menuToggle');if(b)b.textContent=o?'Close':'Menu';}}</script>
  <style>
    :root {
      --bg-page: #0C0A09; --bg-card: #1C1917; --bg-elevated: #292524;
      --bg-inverse: #292524; --bg-overlay: #000000; --bg-hover: rgba(255,255,255,0.06);
      --text-primary: #FAFAF9; --text-secondary: #D6D3D1; --text-muted: #A8A29E; --text-inverse: #FAFAF9;
      --text-nav: #A8A29E; --text-gold: #CA8A04;
      --border-subtle: #292524; --border-medium: #44403C; --border-gold: #CA8A04; --border-inverse: #FAFAF9;
      --gold: #CA8A04; --gold-hover: #D97706; --gold-bg: rgba(202,138,4,0.15);
      --navbar-bg: rgba(12,10,9,0.95); --hero-from: #000000; --hero-via: #1C1917; --hero-to: #0C0A09;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; background: var(--bg-page); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
    .font-cormorant { font-family: 'Cormorant', serif; }
    .font-montserrat { font-family: 'Montserrat', sans-serif; }
    a { text-decoration: none; color: inherit; }
    .toast-notification { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text-primary); color: var(--bg-page); padding: 14px 28px; font-family: 'Montserrat', sans-serif; font-size: 14px; z-index: 9999; opacity: 0; transition: all 0.3s ease; pointer-events: none; }
    .toast-notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; } }
    ::selection { background: var(--gold); color: var(--text-primary); }
    .nav-link { position: relative; }
    .nav-link::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 0; height: 1px; background: var(--gold); transition: width 0.3s ease; }
    .nav-link:hover::after { width: 100%; }
    input, select, textarea { border-radius: 0; -webkit-appearance: none; }
    input:focus, select:focus, textarea:focus { outline: none; }
    .desktop-nav { display: flex; align-items: center; position: relative; }
    @media (min-width: 768px) { .md-hidden { display: none !important; } }
      .nav-links { display: flex; align-items: center; gap: 2rem; }
    .mobile-menu-close { display: none; }
    .menu-btn { display: none; }
    @media (max-width: 767px) {
      .nav-links { display: none; position: fixed; inset: 0; top: 64px; background: rgba(12,10,9,0.97); flex-direction: column; align-items: center; justify-content: center; gap: 0; z-index: 100; opacity: 0; transition: opacity 0.25s ease; }
      .nav-links.open { display: flex; opacity: 1; }
      .nav-links a { padding: 18px 0; font-size: 14px; letter-spacing: 0.25em; min-height: 56px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
      .mobile-menu-close { display: block; position: absolute; top: 16px; right: 16px; background: none; border: none; cursor: pointer; color: var(--text-secondary); padding: 8px; }
      .mobile-menu-close:hover { color: var(--text-primary); }
      .menu-btn { display: inline-flex; align-items: center; gap: 6px; background: none; border: none; cursor: pointer; padding: 0; font-family: 'Montserrat', sans-serif; font-size: 11px; color: var(--text-secondary); letter-spacing: 0.15em; text-transform: uppercase; }
      .menu-btn:hover { color: var(--text-primary); }
    }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; }
    .product-card { background: var(--bg-card); border: 1px solid var(--border-subtle); overflow: hidden; transition: all 0.3s ease; cursor: pointer; display: flex; flex-direction: column; }
    .product-card:hover { border-color: var(--gold); transform: translateY(-4px); box-shadow: 0 8px 30px rgba(202,138,4,0.1); }
    .product-card img { width: 100%; height: 280px; object-fit: cover; border-bottom: 1px solid var(--border-subtle); transition: transform 0.7s; }
    .product-card:hover img { transform: scale(1.05); }
    .product-card .product-info { padding: 20px; display: flex; flex-direction: column; flex: 1; }
    .product-card .brand-tag { font-family: 'Montserrat', sans-serif; font-size: 11px; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
    .product-card h3 { font-family: 'Cormorant', serif; font-size: 18px; color: var(--text-primary); margin-bottom: 8px; font-weight: 500; }
    .product-card .price { font-family: 'Cormorant', serif; font-size: 20px; font-weight: 600; color: var(--gold); }
    .product-card .original-price { font-family: 'Montserrat', sans-serif; font-size: 12px; color: var(--text-muted); text-decoration: line-through; margin-left: 8px; }
    .product-card .badge-new { position: absolute; top: 12px; left: 12px; background: var(--gold); color: #1C1917; padding: 4px 12px; font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; }
    .product-card .badge-sale { position: absolute; top: 12px; right: 12px; background: #DC2626; color: white; padding: 4px 12px; font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; }
    @media (max-width: 767px) { .product-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } .product-card img { height: 180px; } .product-card .product-info { padding: 12px; } .product-card h3 { font-size: 14px; } .product-card .price { font-size: 16px; } .product-card .brand-tag { font-size: 9px; } }
    .bg-page { background: var(--bg-page); }
    .bg-card { background: var(--bg-card); }
    .bg-elevated { background: var(--bg-elevated); }
    .bg-inverse { background: var(--bg-inverse); }
    .bg-gold { background: var(--gold); }
    .text-primary { color: var(--text-primary); }
    .text-secondary { color: var(--text-secondary); }
    .text-muted-c { color: var(--text-muted); }
    .text-gold { color: var(--gold); }
    .text-inverse { color: var(--text-inverse); }
    .border-subtle { border-color: var(--border-subtle); }
    .border-medium { border-color: var(--border-medium); }
    .border-gold { border-color: var(--gold); }
    .border-inverse { border-color: var(--border-inverse); }
    .hover-bg-gold:hover { background: var(--gold); }
    .hover-text-gold:hover { color: var(--gold); }
    .hover-text-primary:hover { color: var(--text-primary); }
    .hover-border-gold:hover { border-color: var(--gold); }
    .hover-bg-page:hover { background: var(--bg-page); }
    .hover-bg-hover:hover { background: var(--bg-hover); }
    .hover-bg-gold:hover { background: var(--gold); }
    .hover-bg-gold-hover:hover { background: var(--gold-hover); }
    .hover-bg-inverse:hover { background: var(--bg-inverse); }
    .hover-border-inverse:hover { border-color: var(--border-inverse); }
    .hover-border-gold-hover:hover { border-color: var(--gold); }
    .hover-border-gold:hover { border-color: var(--gold); }
    .bg-overlay { background: var(--bg-overlay); }
    .navbar-blur { background: var(--navbar-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .text-stone-300 { color: #A8A29E; }
    .text-stone-400 { color: #A8A29E; }
    .text-stone-500 { color: #78716C; }
    .text-stone-600 { color: #D6D3D1; }
    .text-stone-700 { color: #E7E5E4; }
    .bg-stone-100 { background-color: #292524; }
    .border-stone-200 { border-color: #292524; }
    .border-stone-300 { border-color: #44403C; }
    .hover\:bg-stone-100:hover { background-color: #292524; }
    .bg-green-100 { background-color: #065F46; }
    .text-green-600 { color: #6EE7B7; }
    .brand-ticker-wrap { overflow: hidden; width: 100%; }
    .brand-ticker { display: flex; gap: 0; width: max-content; animation: tickerScroll 40s linear infinite; }
    .brand-ticker:hover { animation-play-state: paused; }
    @keyframes tickerScroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .brand-card { flex-shrink: 0; width: 200px; height: 100px; display: flex; align-items: center; justify-content: center; margin: 0 12px; perspective: 800px; cursor: pointer; position: relative; }
    .brand-card-inner { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-subtle); background: var(--bg-card); transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); transform-style: preserve-3d; position: relative; overflow: hidden; }
    .brand-card-inner svg { transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
    .brand-card:hover .brand-card-inner { transform: translateZ(20px) rotateX(-4deg) rotateY(4deg); border-color: var(--gold); box-shadow: 0 20px 40px -12px rgba(0,0,0,0.3), 0 0 0 1px rgba(202,138,4,0.15); }
    .brand-card:hover .brand-card-inner::after { opacity: 1; }
    .brand-card:hover .brand-card-inner svg { filter: drop-shadow(0 0 8px rgba(202,138,4,0.2)); }
    .brand-card-inner::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(202,138,4,0.08) 0%, transparent 50%, rgba(202,138,4,0.04) 100%); opacity: 0; transition: opacity 0.4s ease; pointer-events: none; }
    @media (max-width: 767px) { .brand-card { perspective: none; width: 320px; height: 160px; } .brand-card-inner { transform-style: flat; transition: none; background: none; border-color: transparent; } .brand-card-inner svg { transition: none; height: 108px; width: auto; color: #E7E5E4 !important; } .brand-card-inner::after { display: none; } }
    .admin-sidebar { min-width: 240px; }
    .admin-tab { transition: all 0.2s ease; }
    .admin-tab.active { background: var(--gold); color: #1C1917; border-color: var(--gold); }
    .admin-tab:not(.active):hover { background: var(--bg-hover); }
    .admin-table th { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); font-weight: 600; padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border-subtle); }
    .admin-table td { padding: 12px 16px; border-bottom: 1px solid var(--border-subtle); font-size: 13px; }
    .admin-table tr:hover td { background: var(--bg-hover); }
    .admin-input { width: 100%; border: 1px solid var(--border-medium); padding: 10px 14px; font-family: 'Montserrat',sans-serif; font-size: 13px; background: var(--bg-card); color: var(--text-primary); transition: border-color 0.2s; }
    .admin-input:focus { border-color: var(--gold); outline: none; }
    .admin-select { width: 100%; border: 1px solid var(--border-medium); padding: 10px 14px; font-family: 'Montserrat',sans-serif; font-size: 13px; background: var(--bg-card); color: var(--text-primary); transition: border-color 0.2s; cursor: pointer; }
    .admin-select:focus { border-color: var(--gold); outline: none; }
    .admin-btn { padding: 10px 20px; font-family: 'Montserrat',sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; border: none; }
    .admin-btn-primary { background: var(--gold); color: #1C1917; }
    .admin-btn-primary:hover { background: var(--gold-hover); }
    .admin-btn-danger { background: #DC2626; color: white; }
    .admin-btn-danger:hover { background: #B91C1C; }
    .admin-btn-ghost { background: transparent; border: 1px solid var(--border-medium); color: var(--text-primary); }
    .admin-btn-ghost:hover { border-color: var(--gold); }
    .admin-section-tag { display: inline-block; padding: 2px 10px; font-size: 10px; font-family: 'Montserrat',sans-serif; letter-spacing: 0.05em; background: var(--gold-bg); color: var(--gold); border: 1px solid rgba(202,138,4,0.2); }
    .admin-checkbox-group label { display: flex; align-items: center; gap: 8px; font-size: 13px; font-family: 'Montserrat',sans-serif; cursor: pointer; }
    .admin-checkbox-group input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--gold); cursor: pointer; }
    .section-toggle { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; font-family: 'Montserrat',sans-serif; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; border: 1px solid var(--border-medium); background: transparent; color: var(--text-muted); transition: all 0.2s; user-select: none; }
    .section-toggle.active { background: var(--gold-bg); border-color: var(--gold); color: var(--gold); }
    .admin-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 70; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .product-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 70; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .admin-modal { background: var(--bg-card); border: 1px solid var(--border-subtle); max-width: 600px; width: 100%; max-height: 80vh; overflow-y: auto; padding: 32px; }
    .admin-badge { display: inline-block; padding: 2px 10px; font-size: 10px; font-family: 'Montserrat',sans-serif; letter-spacing: 0.05em; font-weight: 600; }
    .admin-badge-pending { background: #78350F; color: #FDE68A; }
    .admin-badge-confirmed { background: #1E3A5F; color: #93C5FD; }
    .admin-badge-shipped { background: #312E81; color: #C7D2FE; }
    .admin-badge-delivered { background: #064E3B; color: #6EE7B7; }
    .admin-badge-cancelled { background: #7F1D1D; color: #FCA5A5; }
    @keyframes gearSpinCW { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes gearSpinCCW { 0% { transform: rotate(0deg); } 100% { transform: rotate(-360deg); } }
    @keyframes balanceOsc { 0% { transform: rotate(-18deg); } 50% { transform: rotate(18deg); } 100% { transform: rotate(-18deg); } }
    @keyframes escapeTick { 0% { transform: rotate(0deg); } 50% { transform: rotate(8deg); } 100% { transform: rotate(0deg); } }
    @media (prefers-reduced-motion: reduce) { .hero-gear { animation: none !important; } }
    @media (max-width: 767px) { .hero-gear-complex { display: none; } }
    .hero-gear { will-change: transform; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <header class="fixed top-0 left-0 right-0 z-50 navbar-blur border-b border-subtle">
